name: Android

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: upstream-proxyt/go.mod
          cache-dependency-path: upstream-proxyt/go.sum

      - name: Run Go tests
        working-directory: upstream-proxyt
        run: go test ./...

  android-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: upstream-proxyt/go.mod
          cache-dependency-path: upstream-proxyt/go.sum

      - uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Write local.properties
        run: printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Run Android PR verification
        run: ./gradlew -Pproxyt.abis=arm64-v8a verifyAndroidPr

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  android-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: upstream-proxyt/go.mod
          cache-dependency-path: upstream-proxyt/go.sum

      - uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;29.0.14206865"

      - name: Write local.properties
        run: printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Prepare signing inputs
        shell: bash
        run: |
          if [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            {
              echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore"
              echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
              echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
              echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
            } >> "$GITHUB_ENV"
          fi

      - name: Assemble release
        run: ./gradlew :app:assembleRelease

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

      - name: Upload mapping files
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: app/build/outputs/mapping/release/**
